function convertDriveUrl(raw) {
  if (!raw) return raw;
  if (raw.includes('lh3.googleusercontent.com')) return raw;
  const shareMatch = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (shareMatch) return `https://lh3.googleusercontent.com/d/${shareMatch[1]}`;
  const ucMatch = raw.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (ucMatch) return `https://lh3.googleusercontent.com/d/${ucMatch[1]}`;
  return raw;
}

  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  useEffect(() => {
    loadFirebase().then(() => {
      if (firebaseReady) {
        setFbReady(true);
        auth.onAuthStateChanged(auth.inst, async u => {
          if (u) {
            setUser(u);

            setView("rate");

function UploadScreen({
  demoMode,
  onUpload,
  showToast
}) {
  const [mode, setMode] = useState("single"); // single | bulk | folder
  const [folderUrl, setFolderUrl] = useState("");
  // Single mode
  const [name, setName] = useState("");
  const [url, setUrl] = useState("");
  const [tags, setTags] = useState([]);
  const [tagInput, setTagInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [aiLoading, setAiLoading] = useState(false);
  const [done, setDone] = useState(false);
  const [previewError, setPreviewError] = useState(false);
  // Bulk mode
  const [bulkText, setBulkText] = useState("");
  const [bulkParsed, setBulkParsed] = useState([]);
  const [bulkProgress, setBulkProgress] = useState(null); // {done, total}
  const [bulkDone, setBulkDone] = useState(false);
  function parseBulkText(text) {
    // Each line: "Design Name | URL" or just "URL" (uses filename as name)
    return text.split("\n").map(line => line.trim()).filter(Boolean).map(line => {
      const parts = line.split("|").map(p => p.trim());
      if (parts.length >= 2) return {
        name: parts[0],
        url: convertDriveUrl(parts[1])
      };
      const url = convertDriveUrl(parts[0]);
      // Extract name from URL or use generic
      const urlName = parts[0].split("/").pop().split("?")[0].replace(/\.[^.]+$/, "") || "Design";
      return {
        name: urlName,
        url
      };
    });
  }
  function handleBulkParse() {
    const parsed = parseBulkText(bulkText);
    setBulkParsed(parsed);
  }
  async function handleBulkUpload() {
    if (!bulkParsed.length) return;
    setBulkProgress({
      done: 0,
